<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --background: #0f0f10;
      --foreground: #f7f7f8;
      --muted: #a1a1aa;
      --primary: #f4f4f5;
      --primary-foreground: #111113;
      --success: #34d399;
      --error: #f87171;
      --border: #2b2b30;
      --card: #17171a;
      --radius: 0.625rem;
      --radius-sm: 0.5rem;
    }

    body {
      width: 350px;
      padding: 0;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
    }

    .container {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subhead {
      font-size: 12px;
      color: var(--muted);
      margin: 0;
      line-height: 1.4;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }

    .card.error {
      border-color: var(--error);
      background: rgba(248, 113, 113, 0.08);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 500;
      cursor: pointer;
      font-size: 13px;
      transition: opacity 0.2s;
    }

    button:focus-visible {
      outline: 2px solid var(--foreground);
      outline-offset: 2px;
    }

    button.primary {
      background-color: var(--primary);
      color: var(--primary-foreground);
    }

    button.secondary {
      background-color: transparent;
      color: var(--foreground);
      border: 1px solid var(--border);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.4;
      color: var(--muted);
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--error);
    }

    #progress {
      display: none;
      margin-top: 10px;
    }

    .progress-bar {
      height: 4px;
      background: #252529;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--foreground);
      animation: indeterminate 1.3s infinite linear;
      width: 50%;
    }

    @keyframes indeterminate {
      0% {
        transform: translateX(-100%);
        width: 20%;
      }

      50% {
        width: 60%;
      }

      100% {
        transform: translateX(200%);
        width: 20%;
      }
    }

    .open-app {
      display: inline-flex;
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .open-app:focus-visible {
      outline: 2px solid var(--foreground);
      outline-offset: 2px;
      border-radius: 2px;
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      margin-bottom: 0;
    }
  </style>
</head>

<body>
  <div class="container">
    <header class="header">
      <h1>
        <img src="bukmarks-icon.png" alt="Bukmarks" width="22" height="22" style="display: block; flex-shrink: 0;">
        Bukmarks Extension
      </h1>
      <p class="subhead">Save this page or import browser bookmarks.</p>
    </header>

    <div id="authStatus" class="card" role="status" aria-live="polite">
      Checking authentication...
    </div>

    <div id="loginPrompt" style="display: none;" class="card">
      <p class="subhead" style="margin-bottom: 10px; color: var(--foreground);">Sign in to Bukmarks to use this extension.</p>
      <button type="button" id="loginBtn" class="primary">Open login</button>
      <button type="button" id="recheckBtn" class="secondary" style="margin-top: 8px;">Check again</button>
      <a href="#" class="open-app open-app-link">Open Bukmarks</a>
    </div>

    <div id="exportSection" style="display: none;" class="card">
      <div class="actions">
        <button type="button" id="savePageBtn" class="primary">Save current page</button>
        <p id="savePageHint" class="hint" style="display: none;"></p>
        <button type="button" id="exportBtn" class="secondary">Import browser bookmarks</button>
      </div>

      <div id="progress">
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
      </div>

      <div id="status" class="status" role="status" aria-live="polite"></div>
      <div id="importProgress" class="status"></div>

      <a href="#" class="open-app open-app-link">Open Bukmarks</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
